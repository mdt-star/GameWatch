name: Build Windows exe

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.5.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Deploy Qt DLLs
      run: windeployqt build/Release/GameWatch.exe

    - name: Package
      run: |
        cd build/Release
        Compress-Archive -Path GameWatch.exe, *.dll, platforms/, styles/, bearer/, imageformats/, generic/, iconengines/, accessible/ -DestinationPath GameWatch-Windows.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameWatch-Windows
        path: build/Release/GameWatch-Windows.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: build/Release/GameWatch-Windows.zip
        generate_release_notes: true