name: Build Windows exe

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.5.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'

    - name: Install vcpkg dependencies
      run: |
        vcpkg install openssl-windows:x64-windows
        echo "VCPKG_ROOT=${VCPKG_INSTALLATION_ROOT}" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"

    - name: Build
      run: cmake --build build --config Release

    - name: Deploy Qt DLLs
      run: windeployqt --network build/Release/GameWatch.exe

    - name: Copy OpenSSL DLLs
      run: |
        copy "$env:VCPKG_INSTALLATION_ROOT\packages\openssl-windows_x64-windows\bin\libcrypto-3-x64.dll" build/Release/
        copy "$env:VCPKG_INSTALLATION_ROOT\packages\openssl-windows_x64-windows\bin\libssl-3-x64.dll" build/Release/

    - name: Package
      run: |
        cd build/Release
        Compress-Archive -Path GameWatch.exe, *.dll, platforms/, styles/, imageformats/, iconengines/ -DestinationPath GameWatch-Windows.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameWatch-Windows
        path: build/Release/GameWatch-Windows.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: build/Release/GameWatch-Windows.zip